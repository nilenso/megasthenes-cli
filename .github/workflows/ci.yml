name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows release.yml (and any future workflow) to invoke this as a
  # dependency; the gating check before publish lives here so we don't
  # duplicate lint/typecheck/test steps across workflows.
  workflow_call:

jobs:
  check:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
